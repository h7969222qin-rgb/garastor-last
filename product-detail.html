<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ProductsDetails — GARASTOR</title>
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<!-- Google Fonts removed for local rendering -->
<style>
:root{--bg:#080808;--surface:#111;--border:#222;--gold:#c8a45c;--text:#e8e4df;--dim:#6b6762;--font-display:Georgia,'Times New Roman','Noto Serif SC',serif;--font-body:'Segoe UI','Helvetica Neue',Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body)}
a{color:var(--gold);text-decoration:none}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-logo{font-family:var(--font-display);font-size:1.3rem;color:#fff}.hdr-back{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim)}
.layout{max-width:1400px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
@media(max-width:860px){.layout{grid-template-columns:1fr;padding:1rem}}
.gallery{position:sticky;top:90px}@media(max-width:860px){.gallery{position:static}}
.gallery-main{aspect-ratio:3/4;background:var(--surface);overflow:hidden;position:relative;border-radius:2px}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:opacity 0.5s}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:#fff;border:none;font-size:1.5rem;padding:0.5rem 0.8rem;cursor:pointer;transition:background 0.3s;z-index:5}
.gallery-nav:hover{background:rgba(200,164,92,0.45)}.gallery-prev{left:0;border-radius:0 4px 4px 0}.gallery-next{right:0;border-radius:4px 0 0 4px}
.gallery-counter{position:absolute;bottom:1rem;right:1rem;font-size:0.65rem;background:rgba(0,0,0,0.7);color:var(--dim);padding:0.3rem 0.7rem;border-radius:2px}
.gallery-strip{display:flex;gap:4px;margin-top:4px;overflow-x:auto;padding:4px 0}
.gallery-strip img{width:60px;height:60px;object-fit:cover;cursor:pointer;opacity:0.35;border:1px solid transparent;transition:all 0.3s;flex-shrink:0;border-radius:1px}
.gallery-strip img.active,.gallery-strip img:hover{opacity:1;border-color:var(--gold)}
.info{padding-top:1rem}
.eyebrow{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold)}
.code{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.2rem);font-weight:500;color:#fff;margin:0.5rem 0;letter-spacing:0.04em}
.meta{font-size:0.7rem;letter-spacing:0.1em;color:var(--dim);text-transform:uppercase;margin-bottom:1.5rem}
.divider{width:50px;height:1px;background:var(--gold);margin:1.5rem 0}
.desc{font-size:0.85rem;line-height:1.9;color:var(--dim)}
.specs{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:1.5rem 0}
.spec-item{border-bottom:1px solid var(--border);padding-bottom:0.6rem}
.spec-label{font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim)}
.spec-value{font-size:0.8rem;color:#fff;margin-top:0.2rem}
.btn{display:inline-block;padding:0.9rem 2.5rem;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;border:1px solid var(--gold);color:var(--gold);cursor:pointer;transition:all 0.35s;margin-top:1rem;text-align:center}
.btn:hover{background:var(--gold);color:#080808}
.related{max-width:1400px;margin:0 auto;padding:3rem 2rem;border-top:1px solid var(--border)}
.related h2{font-family:var(--font-display);font-size:1.6rem;color:#fff;margin-bottom:1.5rem;font-weight:400}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:3px;background:var(--border)}
.rel-card{background:var(--surface);aspect-ratio:3/4;position:relative;overflow:hidden}
.rel-card img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s}
.rel-card:hover img{transform:scale(1.05)}
.rel-card span{position:absolute;bottom:0;left:0;right:0;padding:1rem;background:linear-gradient(transparent,rgba(0,0,0,0.9));font-family:var(--font-display);font-size:0.9rem;color:#fff}
.loading{text-align:center;padding:6rem;font-family:var(--font-display);font-size:1.5rem;color:var(--dim)}
</style></head>
<body>
<header class="hdr"><a href="products.html" class="hdr-back">&larr; Collection</a><a href="index.html" class="hdr-logo">GARASTOR</a><div></div></header>
<div id="app"><div class="loading">Loading&hellip;</div></div>
<script src="js/tracking.js"></script>
<script>
(function(){
var code=new URLSearchParams(location.search).get('id');
if(!code){document.getElementById('app').innerHTML='<div class="loading">No product specified.<br><a href="products.html">Browse collection</a></div>';return}
document.title=code+' — GARASTOR';

fetch('products-data.json').then(function(r){return r.json()}).then(function(data){
var found=null,cat=null;
for(var i=0;i<data.categories.length;i++){var c=data.categories[i];for(var j=0;j<c.products.length;j++){if(c.products[j].code===code){found=c.products[j];cat=c;break}}if(found)break}
if(!found){document.getElementById('app').innerHTML='<div class="loading">Product &ldquo;'+code+'&rdquo; not found.<br><a href="products.html">Return to collection</a></div>';return}
if(window.GarastorTrack)GarastorTrack.pageView('product-detail',cat.slug,code);

var subPath=found.subcategory?found.subcategory+'/':'';
var imgBase='/images/products/'+cat.slug+'/'+found.code+'/'+found.code;
var startIdx=found.firstImg||1;
var imgs=[];
for(var k=0;k<found.images;k++){var n=(startIdx+k)<10?'0'+(startIdx+k):''+(startIdx+k);imgs.push(imgBase+'_'+n+'.jpg')}

var related=cat.products.filter(function(p){return p.code!==code});
for(var ri=related.length-1;ri>0;ri--){var rj=Math.floor(Math.random()*(ri+1));var t=related[ri];related[ri]=related[rj];related[rj]=t}
related=related.slice(0,6);

var relHTML='';related.forEach(function(r){var rs=r.subcategory?r.subcategory+'/':'';var rf=r.firstImg||1;var rn=rf<10?'0'+rf:''+rf;relHTML+='<a href="product-detail.html?id='+encodeURIComponent(r.code)+'" class="rel-card"><img src="./images/products/'+cat.slug+'/'+r.code+'/'+r.code+'_'+rn+'.jpg" alt="'+r.code+'" loading="lazy" onerror="this.style.border=\'2px solid red\'"><span>'+r.code+'</span></a>'});

var stripHTML=imgs.map(function(src,i){return '<img src="'+src+'" class="'+(i===0?'active':'')+'" data-idx="'+i+'" onerror="this.style.border=\'2px solid red\'" onclick="switchImg('+i+')">'}).join('');

document.getElementById('app').innerHTML=
'<div class="layout">'+
  '<div class="gallery">'+
    '<div class="gallery-main"><img src="'+imgs[0]+'" id="mainImg" onerror="this.style.border=\'2px solid red\'">'+
      '<button class="gallery-nav gallery-prev" onclick="navImg(-1)">&#10094;</button>'+
      '<button class="gallery-nav gallery-next" onclick="navImg(1)">&#10095;</button>'+
      '<span class="gallery-counter"><span id="curIdx">1</span> / '+imgs.length+'</span></div>'+
    '<div class="gallery-strip">'+stripHTML+'</div></div>'+
  '<div class="info">'+
    '<div class="eyebrow">'+cat.kilianFamily+'</div>'+
    '<h1 class="code">'+found.code+'</h1>'+
    '<div class="meta">'+(found.subcategory||cat.nameZh)+' &bull; '+cat.nameEn+' Flooring</div>'+
    '<div class="divider"></div><p class="desc">'+cat.description+'</p>'+
    '<div class="specs">'+
      '<div class="spec-item"><div class="spec-label">Product Code</div><div class="spec-value">'+found.code+'</div></div>'+
      '<div class="spec-item"><div class="spec-label">Family</div><div class="spec-value">'+cat.kilianFamily+'</div></div>'+
      '<div class="spec-item"><div class="spec-label">Category</div><div class="spec-value">'+cat.nameZh+' / '+cat.nameEn+'</div></div>'+
      '<div class="spec-item"><div class="spec-label">Reference Images</div><div class="spec-value">'+found.images+'</div></div>'+
      (found.subcategory?'<div class="spec-item"><div class="spec-label">Sub-series</div><div class="spec-value">'+found.subcategory+'</div></div>':'')+
      '<div class="spec-item"><div class="spec-label">Material</div><div class="spec-value">Premium Engineered Hardwood</div></div>'+
    '</div>'+
    '<div class="divider"></div>'+
    '<a href="contact.html?product='+encodeURIComponent(found.code)+'" class="btn">Inquire About '+found.code+'</a>'+
  '</div></div>'+
  (related.length?'<div class="related"><h2>You May Also Appreciate</h2><div class="related-grid">'+relHTML+'</div></div>':'');

window.imgs=imgs;window.currentImg=0;
window.switchImg=function(i){window.currentImg=i;document.getElementById('mainImg').src=imgs[i];document.getElementById('curIdx').textContent=i+1;document.querySelectorAll('.gallery-strip img').forEach(function(x,j){x.classList.toggle('active',j===i)})};
window.navImg=function(dir){var n=(window.currentImg+dir+imgs.length)%imgs.length;switchImg(n)};

}).catch(function(e){console.error(e);document.getElementById('app').innerHTML='<div class="loading">Error loading product.</div>'});
})();
</script>

</body>
</html>
